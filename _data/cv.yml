cv:
  name: Gijae Ahn
  label: Robotics Engineer
  email: gijaeahn77@gmail.com
  location: Busan, Korea
  image: ""
  summary: Robotics engineer focused on mobile manipulation, compliant robotic arms, and autonomous robot systems. My recent work combines hardware design, control, motion planning, and high-level software integration for real-world deployment and competition-grade performance.

  sections:
    Education:
      - institution: Pusan National University (PNU)
        location: Busan, Korea
        area: Electrical & Electronic Engineering
        studyType: M.S.
        start_date: 2024-03
        end_date: 2026-02
        highlights:
          - "Thesis: Two Studies in Robotic Manipulation: Development of a Lightweight Compliant 6-DoF Arm and Dynamic Non-Prehensile Object Transfer"

      - institution: Pusan National University (PNU)
        location: Busan, Korea
        area: Electrical Engineering
        studyType: B.S.
        start_date: 2018-03
        end_date: 2024-02
        highlights:
          - "Military Service: Oct 2018 - Jun 2020"

    Experience:
      - company: Tomorro Robotics Korea
        position: Research Intern
        location: Korea
        start_date: 2025-09
        end_date:
        summary: CES 2026 demo system for autonomous factory-line collaboration.
        highlights:
          - Led engineering for an autonomous mobile manipulator in a dual-robot workflow.
          - Implemented end-to-end pipeline for mobile base detection, grasping, and box transport to a conveyor.
          - Ensured synchronization with a secondary VLA-based packing robot.

    Competitions:
      - bullet: "RoboCup@Home 2025 (Salvador) - First Place: Led development of a lightweight compliant 6-DoF manipulator (HW/SW); contributed controller, motion planning, and high-level control API."
      - bullet: "RoboCup@Home 2024 (Eindhoven) - Second Place: Developed arm controller, motion planning modules, and high-level control API interface."
      - bullet: "RoboCup@Home 2023 (Bordeaux) - First Place: Hardware engineering contributions."
      - bullet: "ZEUS Industrial Robot ZERO Mission Challenge 2024 - First Place (Presidential Award, Republic of Korea): Team lead for Robot Bartender; implemented arm controller and motion planning; integrated an LLM-based interaction pipeline."
      - bullet: "Space Exploration & Development Robot Challenge 2023 (Korea) - First Place (Prime Minister's Award, Republic of Korea): Developed a 4-DoF rover arm hardware and controller for a lunar-environment mock mission."
      - bullet: "Baemin Food Delivery Challenge (Real Robot) 2023 - Second Place (President's Award, Korea Institute for Robotics Industry Advancement, KIRIA): Developed a low-level motor driver interface for the real-robot delivery platform."
      - bullet: "Baemin Autonomous Delivery Challenge (Simulation) 2023 - First Place (Ministerial Award, Ministry of Trade, Industry and Energy, MOTIE): Contributed to simulation task setup and overall performance."

    Publications:
