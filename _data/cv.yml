    Projects:
      - name: Autonomous Quadruped Patrol System
        summary: Government and National Police Agency related project.
        highlights:
          - Built perception coverage for safe navigation using four Intel RealSense D435 cameras.
          - Owned camera mount design and a multi-camera depth pipeline (stitching/fusion) to generate obstacle maps.
          - Supported collision-free locomotion on patrol routes with anomaly detection (suspects/illegal parking).

      - name: Mobile Dual-Arm Robot System for Scalable Learning Data Collection
        summary: LG Electronics industry-academia project.
        highlights:
          - Developed a mobile bimanual manipulation platform optimized for data collection and safe policy rollouts.
          - Led development of a lightweight compliant manipulator to reduce environment-damage risk while controlling cost.
          - Extended the platform into the M.S. thesis direction.

